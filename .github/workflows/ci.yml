name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install basic dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install transformers numpy
      continue-on-error: false
    
    - name: Install optional dependencies
      run: |
        pip install -r requirements.txt || echo "⚠ Some requirements failed to install"
        pip install flake8 || echo "⚠ flake8 install failed"
      continue-on-error: true
    
    - name: Basic syntax check (core modules)
      run: |
        python -m py_compile smollm2_converter.py || exit 1
        python -m py_compile loihi_constraints.py || exit 1
        python -m py_compile scripts/run_conversion.py || exit 1
        python -c "print('✓ Core files syntax check passed')"
    
    - name: Test core imports (without SpikingJelly)
      run: |
        python -c "import torch; print('✓ PyTorch import successful')"
        python -c "import transformers; print('✓ Transformers import successful')"
        python -c "import numpy; print('✓ NumPy import successful')"
        echo "✓ Core dependencies importable"
      continue-on-error: false
    
    - name: Test basic functionality
      run: |
        python -c "
        import sys
        try:
            import torch
            from transformers import AutoTokenizer
            print('✓ Basic ML stack working')
            sys.exit(0)
        except Exception as e:
            print(f'✗ Basic test failed: {e}')
            sys.exit(1)
        "
      continue-on-error: false
    
    - name: Test stac_v1 package
      run: |
        python -m py_compile stac_v1/__init__.py || exit 1
        python -m py_compile stac_v1/model.py || exit 1
        python -m py_compile stac_v1/pipeline.py || exit 1
        python -c "print('✓ stac_v1 package syntax check passed')"
      continue-on-error: false
    
    - name: Optional advanced tests
      run: |
        python -m py_compile tests/test_conversational_snn.py || echo "⚠ test_conversational_snn.py syntax check failed"
        python -m py_compile tests/test_v1.py || echo "⚠ test_v1.py syntax check failed"
        python -c "import smollm2_converter; print('✓ smollm2_converter import successful')" || echo "⚠ smollm2_converter import failed"
        python -c "from smollm2_converter import TemporalSpikeProcessor; print('✓ TemporalSpikeProcessor import successful')" || echo "⚠ TemporalSpikeProcessor import failed"
        python -c "import loihi_constraints; print('✓ loihi_constraints import successful')" || echo "⚠ loihi_constraints import failed"
        echo "✓ Advanced tests completed (failures allowed)"
      continue-on-error: true
    
  documentation:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check documentation files
      run: |
        test -f README.md || (echo "✗ README.md missing" && exit 1)
        test -f LICENSE || (echo "✗ LICENSE missing" && exit 1)
        test -f docs/api_reference.md || (echo "✗ API reference missing" && exit 1)
        test -f docs/conversion_workflow.md || (echo "✗ Conversion workflow missing" && exit 1)
        test -f docs/hardware_requirements.md || (echo "✗ Hardware requirements missing" && exit 1)
        echo "✓ All required documentation files present"
    
    - name: Check code structure
      run: |
        # Core modules
        test -f smollm2_converter.py || (echo "✗ smollm2_converter.py missing" && exit 1)
        test -f loihi_constraints.py || (echo "✗ loihi_constraints.py missing" && exit 1)
        test -f requirements.txt || (echo "✗ requirements.txt missing" && exit 1)
        
        # Scripts directory
        test -d scripts || (echo "✗ scripts/ directory missing" && exit 1)
        test -f scripts/run_conversion.py || (echo "✗ scripts/run_conversion.py missing" && exit 1)
        
        # Tests directory
        test -d tests || (echo "✗ tests/ directory missing" && exit 1)
        test -f tests/test_conversational_snn.py || (echo "✗ tests/test_conversational_snn.py missing" && exit 1)
        
        # stac_v1 package
        test -d stac_v1 || (echo "✗ stac_v1/ package missing" && exit 1)
        test -f stac_v1/__init__.py || (echo "✗ stac_v1/__init__.py missing" && exit 1)
        test -f stac_v1/model.py || (echo "✗ stac_v1/model.py missing" && exit 1)
        test -f stac_v1/pipeline.py || (echo "✗ stac_v1/pipeline.py missing" && exit 1)
        
        echo "✓ All core files present"
    
    - name: Check basic file integrity
      run: |
        test -s README.md || (echo "✗ README.md is empty" && exit 1)
        test -s smollm2_converter.py || (echo "✗ smollm2_converter.py is empty" && exit 1)
        grep -q "TemporalSpikeProcessor" smollm2_converter.py || (echo "✗ TemporalSpikeProcessor not found in code" && exit 1)
        grep -q "STAC" README.md || (echo "✗ STAC not mentioned in README" && exit 1)
        echo "✓ File integrity checks passed"
