name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install torch AND torchvision together from the CPU index so their versions
        # match. spikingjelly depends on torchvision; if pip resolves torchvision on its
        # own it may pull a build compiled against a different torch, causing
        # "operator torchvision::nms does not exist" when transformers imports it.
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install "transformers>=4.30,<4.48" "numpy<2.0" packaging pytest spikingjelly tqdm
      continue-on-error: false

    - name: Install optional dependencies
      run: |
        pip install -r requirements.txt || echo "⚠ Some requirements failed to install"
        pip install flake8 || echo "⚠ flake8 install failed"
      continue-on-error: true

    - name: Syntax check (compile every Python file)
      run: |
        python -m compileall -q smollm2_converter.py convert.py loihi_constraints.py spikingjelly_compat.py scripts stac_v1 tests
        python -c "print('✓ py_compile passed for all .py files')"

    - name: Test core imports (top-level modules)
      run: |
        python -c "import torch; print('✓ PyTorch import successful')"
        python -c "import transformers; print('✓ Transformers import successful')"
        python -c "import numpy; print('✓ NumPy import successful')"
        python -c "import spikingjelly; print('✓ SpikingJelly import successful')"
        echo "✓ Core dependencies importable"
      continue-on-error: false

    - name: Hard import-check of the five core modules
      run: |
        python -c "import spikingjelly_compat; print('✓ spikingjelly_compat')"
        python -c "import loihi_constraints; print('✓ loihi_constraints')"
        python -c "import convert; print('✓ convert')"
        python -c "import smollm2_converter; from smollm2_converter import TemporalSpikeProcessor; print('✓ smollm2_converter')"
        python -c "import stac_v1; from stac_v1 import DLPFCTransformer; print('✓ stac_v1')"
      continue-on-error: false

    - name: Run STAC V1 unit tests (gating)
      run: |
        python tests/test_v1.py

    - name: Run the pytest suite (gating)
      # tests/test_conversational_snn.py used to be uncollectable (its test functions
      # request fixtures), so this suite never ran in CI. Pin a tiny model so the
      # conversational tests stay fast.
      env:
        STAC_TEST_MODEL: sshleifer/tiny-gpt2
      run: |
        python -m pytest tests/ -q
    
  documentation:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check documentation files
      run: |
        test -f README.md || (echo "✗ README.md missing" && exit 1)
        test -f LICENSE || (echo "✗ LICENSE missing" && exit 1)
        test -f docs/api_reference.md || (echo "✗ API reference missing" && exit 1)
        test -f docs/conversion_workflow.md || (echo "✗ Conversion workflow missing" && exit 1)
        test -f docs/hardware_requirements.md || (echo "✗ Hardware requirements missing" && exit 1)
        echo "✓ All required documentation files present"
    
    - name: Check code structure
      run: |
        # Core modules
        test -f smollm2_converter.py || (echo "✗ smollm2_converter.py missing" && exit 1)
        test -f loihi_constraints.py || (echo "✗ loihi_constraints.py missing" && exit 1)
        test -f requirements.txt || (echo "✗ requirements.txt missing" && exit 1)
        
        # Scripts directory
        test -d scripts || (echo "✗ scripts/ directory missing" && exit 1)
        test -f scripts/run_conversion.py || (echo "✗ scripts/run_conversion.py missing" && exit 1)
        
        # Tests directory
        test -d tests || (echo "✗ tests/ directory missing" && exit 1)
        test -f tests/test_conversational_snn.py || (echo "✗ tests/test_conversational_snn.py missing" && exit 1)
        
        # stac_v1 package
        test -d stac_v1 || (echo "✗ stac_v1/ package missing" && exit 1)
        test -f stac_v1/__init__.py || (echo "✗ stac_v1/__init__.py missing" && exit 1)
        test -f stac_v1/model.py || (echo "✗ stac_v1/model.py missing" && exit 1)
        test -f stac_v1/pipeline.py || (echo "✗ stac_v1/pipeline.py missing" && exit 1)
        
        echo "✓ All core files present"
    
    - name: Check basic file integrity
      run: |
        test -s README.md || (echo "✗ README.md is empty" && exit 1)
        test -s smollm2_converter.py || (echo "✗ smollm2_converter.py is empty" && exit 1)
        grep -q "TemporalSpikeProcessor" smollm2_converter.py || (echo "✗ TemporalSpikeProcessor not found in code" && exit 1)
        grep -q "STAC" README.md || (echo "✗ STAC not mentioned in README" && exit 1)
        echo "✓ File integrity checks passed"
